services:
  - type: web
    name: rich-links
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --worker-class gevent --workers 4 --timeout 300 app:app
    envVars:
      - key: CAPI_KEY
        sync: false   # Set this in the Render dashboard — never commit the value
